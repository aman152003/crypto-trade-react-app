<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="/public/icons/icon-48x48.png" />
    <link rel="apple-touch-icon" href="/public/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" href="/public/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="/public/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" href="/public/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/public/icons/icon-512x512.png" />
    <meta name="apple-mobile-web-app-status-bar" content="#0A0C1C" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if("serviceWorker" in navigator){
        window.addEventListener('load',async()=>{
          try{
            await navigator.serviceWorker.register('/serviceWorker.js')
            console.log('ServiceWorker registered')
          }catch(err){
            console.log('ServiceWorker failed to register',err)
          }
        })
      }else{
        console.log("ServiceWorker not supported")
      }
    </script>
  </body>
</html>
